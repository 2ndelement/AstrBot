<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Task Control — Event Listeners</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--card:#1a1d27;--card2:#22263a;--border:#2d3148;--accent:#6c63ff;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--text:#e2e8f0;--muted:#64748b;--font:'SF Pro Display','PingFang SC','Microsoft YaHei',system-ui,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding:24px}
h1{font-size:1.5rem;font-weight:700;margin-bottom:4px}
.subtitle{color:var(--muted);font-size:.875rem;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.card-header{padding:16px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.card-title{flex:1;font-weight:600;font-size:1rem}
.card-desc{color:var(--muted);font-size:.8rem;margin-top:2px}
.badge{padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;white-space:nowrap}
.badge-running{background:rgba(34,197,94,.15);color:var(--green)}
.badge-stopped{background:rgba(100,116,139,.15);color:var(--muted)}
.badge-error{background:rgba(239,68,68,.15);color:var(--red)}
.card-body{padding:16px 20px}
.btn{padding:6px 14px;border:none;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.8}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-start{background:var(--green);color:#000}
.btn-stop{background:var(--red);color:#fff}
.btn-save{background:var(--accent);color:#fff}
.btn-sm{padding:4px 10px;font-size:.75rem}
.actions{display:flex;gap:8px;margin-bottom:12px}
.events-table{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:8px}
.events-table th{color:var(--muted);font-weight:500;text-align:left;padding:4px 6px;border-bottom:1px solid var(--border)}
.events-table td{padding:4px 6px;border-bottom:1px solid rgba(45,49,72,.5);vertical-align:top}
.events-table tr:last-child td{border-bottom:none}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0}
.dot-ok{background:var(--green)}
.dot-skip{background:var(--yellow)}
.dot-err{background:var(--red)}
.section-label{font-size:.75rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.toggle-config{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:5px 12px;font-size:.78rem;cursor:pointer;transition:color .15s}
.toggle-config:hover{color:var(--text)}
.config-panel{margin-top:12px;display:none}
.config-panel.open{display:block}
.field{margin-bottom:10px}
.field label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:3px}
.field input,.field textarea,.field select{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 10px;font-size:.82rem;font-family:var(--font);resize:vertical}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
.field .hint{font-size:.72rem;color:var(--muted);margin-top:2px}
.stat-bar{display:flex;gap:16px;padding:12px 20px;background:var(--card2);border-bottom:1px solid var(--border)}
.stat{text-align:center}
.stat-val{font-size:1.1rem;font-weight:700;color:var(--accent)}
.stat-key{font-size:.72rem;color:var(--muted)}
.empty{color:var(--muted);font-size:.82rem;text-align:center;padding:16px}
.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:.85rem;box-shadow:0 4px 20px #0006;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.refresh-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 14px;font-size:.8rem;cursor:pointer;margin-left:auto}
.refresh-btn:hover{color:var(--text)}
</style>
</head>
<body>
<div style="display:flex;align-items:baseline;gap:12px;margin-bottom:4px">
  <h1>⚡ Task Control</h1>
  <button class="refresh-btn" onclick="loadAll()">↻ 刷新</button>
</div>
<div class="subtitle">Event Listener Manager — 外部事件监听管理</div>
<div id="root" class="grid"></div>
<div class="toast" id="toast"></div>

<script>
const TOKEN = localStorage.getItem('tc_token') || '';
const BASE  = '';

async function api(method, path, body) {
  const headers = {'Content-Type':'application/json'};
  if(TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
  const r = await fetch(BASE + path, {method, headers, body: body ? JSON.stringify(body) : undefined});
  return r.json();
}

function toast(msg, color='#22c55e') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.borderColor = color;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

function statusBadge(s) {
  if(s === 'running') return `<span class="badge badge-running">● 运行中</span>`;
  if(s.startsWith('error')) return `<span class="badge badge-error" title="${s}">✖ 错误</span>`;
  return `<span class="badge badge-stopped">○ 停止</span>`;
}

function renderField(schema, val) {
  const id = `f_${schema.key}`;
  const label = `<label for="${id}">${schema.label}${schema.required?'<span style="color:var(--red)"> *</span>':''}</label>`;
  const hint  = schema.description ? `<div class="hint">${schema.description}</div>` : '';
  let input = '';
  const v = val !== null && val !== undefined ? val : (schema.default ?? '');
  if(schema.type === 'bool') {
    input = `<select id="${id}"><option value="true"${v===true||v==='true'?' selected':''}>是</option><option value="false"${v===false||v==='false'?' selected':''}>否</option></select>`;
  } else if(schema.type === 'text') {
    input = `<textarea id="${id}" rows="4">${String(v)}</textarea>`;
  } else if(schema.type === 'list') {
    const arr = Array.isArray(v) ? v : (v ? [v] : []);
    input = `<textarea id="${id}" rows="3" placeholder="每行一个">${arr.join('\n')}</textarea>`;
  } else if(schema.type === 'password') {
    input = `<input type="password" id="${id}" placeholder="留空保持不变" autocomplete="new-password">`;
  } else if(schema.type === 'number') {
    input = `<input type="number" id="${id}" value="${v}">`;
  } else {
    input = `<input type="text" id="${id}" value="${String(v)}">`;
  }
  return `<div class="field">${label}${input}${hint}</div>`;
}

function collectConfig(name, schema, existingRaw) {
  const cfg = {...(existingRaw || {})};
  for(const s of schema) {
    const el = document.getElementById(`f_${s.key}`);
    if(!el) continue;
    let v = el.value;
    if(s.type === 'bool') v = v === 'true';
    else if(s.type === 'number') v = v === '' ? null : Number(v);
    else if(s.type === 'list') v = v.split('\n').map(x=>x.trim()).filter(Boolean);
    else if(s.type === 'password') { if(!v) continue; } // blank = keep existing
    cfg[s.key] = v;
  }
  return cfg;
}

function renderCard(l) {
  const isRunning = l.status === 'running';
  const events = (l.recent_events || []).slice().reverse();

  let eventsHTML = '';
  if(events.length) {
    eventsHTML = `<table class="events-table">
      <tr><th>时间</th><th>来源</th><th>摘要</th><th>状态</th></tr>
      ${events.slice(0,10).map(e=>{
        const t = e.time ? e.time.replace(' UTC','') : '';
        const dot = e.dispatched ? 'dot-ok' : (e.source==='error'?'dot-err':'dot-skip');
        const status = e.dispatched ? '✅ 推送' : (e.source==='error'?'❌':'⏭ 过滤');
        const src = (e.source||'').slice(0,30);
        const sum = (e.summary||'').slice(0,60);
        return `<tr><td style="white-space:nowrap;color:var(--muted)">${t}</td><td>${src}</td><td>${sum}</td><td>${status}</td></tr>`;
      }).join('')}
    </table>`;
  } else {
    eventsHTML = `<div class="empty">暂无事件记录</div>`;
  }

  const fieldsHTML = l.config_schema.map(s => renderField(s, l.raw_config?.[s.key])).join('');

  return `
  <div class="card" id="card_${l.name}">
    <div class="card-header">
      <div style="flex:1">
        <div class="card-title">${l.display_name}</div>
        <div class="card-desc">${l.description}</div>
      </div>
      ${statusBadge(l.status)}
    </div>
    <div class="stat-bar">
      <div class="stat"><div class="stat-val">${l.event_count}</div><div class="stat-key">总事件</div></div>
      <div class="stat"><div class="stat-val" id="evcount_${l.name}">${l.recent_events?.filter(e=>e.dispatched).length||0}</div><div class="stat-key">已推送</div></div>
    </div>
    <div class="card-body">
      <div class="actions">
        ${isRunning
          ? `<button class="btn btn-stop btn-sm" onclick="doStop('${l.name}')">⏹ 停止</button>`
          : `<button class="btn btn-start btn-sm" onclick="doStart('${l.name}')">▶ 启动</button>`}
        <button class="toggle-config" onclick="toggleConfig('${l.name}')">⚙ 配置</button>
        <button class="btn btn-sm" style="background:var(--card2);color:var(--muted)" onclick="refreshEvents('${l.name}')">↻ 事件</button>
      </div>

      <div class="config-panel" id="cfg_${l.name}">
        <div class="section-label" style="margin-bottom:10px">配置</div>
        ${fieldsHTML}
        <button class="btn btn-save btn-sm" onclick="saveConfig('${l.name}', ${JSON.stringify(l.config_schema).replace(/"/g,'&quot;')})">💾 保存配置</button>
      </div>

      <div class="section-label" style="margin-top:12px">最近事件</div>
      <div id="events_${l.name}">${eventsHTML}</div>
    </div>
  </div>`;
}

function toggleConfig(name) {
  const p = document.getElementById('cfg_' + name);
  p.classList.toggle('open');
}

async function doStart(name) {
  const r = await api('POST', `/api/listeners/${name}/start`);
  if(r.status === 'ok') { toast('✅ 已启动'); setTimeout(loadAll, 800); }
  else toast('❌ ' + r.message, 'var(--red)');
}
async function doStop(name) {
  const r = await api('POST', `/api/listeners/${name}/stop`);
  if(r.status === 'ok') { toast('⏹ 已停止'); setTimeout(loadAll, 800); }
  else toast('❌ ' + r.message, 'var(--red)');
}

async function saveConfig(name, schema) {
  const r0 = await api('GET', `/api/listeners/${name}/config/raw`);
  const existing = r0.data || {};
  const cfg = collectConfig(name, schema, existing);
  const r = await api('POST', `/api/listeners/${name}/config`, cfg);
  if(r.status === 'ok') toast('💾 配置已保存');
  else toast('❌ ' + r.message, 'var(--red)');
}

async function refreshEvents(name) {
  const r = await api('GET', `/api/listeners/${name}/events`);
  if(r.data) {
    const container = document.getElementById('events_' + name);
    const events = (r.data || []).slice().reverse();
    if(!events.length) { container.innerHTML = '<div class="empty">暂无事件记录</div>'; return; }
    container.innerHTML = `<table class="events-table">
      <tr><th>时间</th><th>来源</th><th>摘要</th><th>状态</th></tr>
      ${events.slice(0,10).map(e=>{
        const t = e.time ? e.time.replace(' UTC','') : '';
        const status = e.dispatched ? '✅ 推送' : (e.source==='error'?'❌':'⏭');
        return `<tr><td style="white-space:nowrap;color:var(--muted)">${t}</td><td>${(e.source||'').slice(0,30)}</td><td>${(e.summary||'').slice(0,60)}</td><td>${status}</td></tr>`;
      }).join('')}
    </table>`;
  }
}

async function loadAll() {
  const r = await api('GET', '/api/listeners');
  if(!r.data) return;
  const root = document.getElementById('root');
  root.innerHTML = r.data.map(renderCard).join('');
}

// 每 10 秒自动刷新状态
loadAll();
setInterval(async () => {
  const r = await api('GET', '/api/listeners');
  if(!r.data) return;
  for(const l of r.data) {
    const badge = document.querySelector(`#card_${l.name} .badge`);
    if(badge) badge.outerHTML = (statusBadge(l.status));
  }
}, 10000);
</script>
</body>
</html>
